spring:
  application:
    name: medicore-hms
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        envers:
          store_data_at_delete: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    placeholders:
      disable_seeded_users: ${APP_DISABLE_SEEDED_USERS:false}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:false}
    name: ${APP_BOOTSTRAP_ADMIN_NAME:Platform Admin}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
  security:
    cors:
      allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    jwt:
      secret: ${APP_JWT_SECRET}
      access-token-minutes: ${APP_JWT_ACCESS_MINUTES:15}
      refresh-token-days: ${APP_JWT_REFRESH_DAYS:7}
