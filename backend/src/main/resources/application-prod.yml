spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    placeholders:
      disable_seeded_users: ${APP_DISABLE_SEEDED_USERS:true}

server:
  forward-headers-strategy: framework

logging:
  level:
    org.hibernate.SQL: WARN

app:
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    name: ${APP_BOOTSTRAP_ADMIN_NAME:Platform Admin}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD}
  security:
    cors:
      allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGINS}
    jwt:
      secret: ${APP_JWT_SECRET}
